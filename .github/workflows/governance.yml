name: governance

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  risk-classification:
    name: risk-classification
    runs-on: ubuntu-latest
    outputs:
      risk_level: ${{ steps.classify.outputs.risk_level }}
      risk_label: ${{ steps.classify.outputs.risk_label }}
      risk_reason: ${{ steps.classify.outputs.risk_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Classify risk from changed paths
        id: classify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: node scripts/governance/classify-risk.mjs

  governance-evidence:
    name: governance-evidence
    runs-on: ubuntu-latest
    needs: risk-classification
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate mandatory PR evidence for risk:high
        env:
          RISK_LEVEL: ${{ needs.risk-classification.outputs.risk_level }}
          RISK_REASON: ${{ needs.risk-classification.outputs.risk_reason }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node scripts/governance/validate-evidence.mjs

  governance-domain:
    name: governance-domain
    runs-on: ubuntu-latest
    needs: [risk-classification, governance-evidence]
    if: ${{ needs.risk-classification.outputs.risk_level == 'high' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run golden dataset + monotonicity tests
        run: npm test -- --runInBand tests/governance/pricing-golden-dataset.test.js tests/governance/pricing-monotonicity.test.js

      - name: Run syntax check
        run: npm run check

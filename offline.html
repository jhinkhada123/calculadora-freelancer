<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Calculadora Freelancer</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #070a12;
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(560px, 100%);
        background: #0b1020;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }
      p {
        margin: 0 0 10px;
        color: #cbd5e1;
        line-height: 1.5;
      }
      a {
        color: #818cf8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Você está offline</h1>
      <p>A calculadora principal funciona offline após o primeiro carregamento completo.</p>
      <p>Quando a conexão voltar, recarregue para atualizar arquivos e recursos opcionais.</p>
      <p><a href="/">Tentar abrir a calculadora</a></p>
    </div>
  </body>
</html>
